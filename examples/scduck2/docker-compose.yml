version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: scduck2-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data

  minio:
    image: quay.io/minio/minio
    container_name: scduck2-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  postgres:
    image: postgres:16
    container_name: scduck2-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ducklake
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # MinIO bucket initialization and config upload
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: scduck2-minio-init
    depends_on:
      - minio
    volumes:
      - ./scduck2.yml:/config/scduck2.yml:ro
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/oxidizer-configs --ignore-existing;
      mc mb local/data-lake --ignore-existing;
      mc cp /config/scduck2.yml local/oxidizer-configs/scduck2.yml;
      echo 'Buckets created and config uploaded successfully';
      exit 0;
      "

volumes:
  redis-data:
  minio-data:
  postgres-data:
