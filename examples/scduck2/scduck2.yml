version: 1
name: scduck2

connections:
  - name: weather_api
    type: api
    base_url: https://api.open-meteo.com

  - name: data_lake
    type: ducklake
    s3_endpoint: localhost:9000
    s3_access_key_id: minioadmin
    s3_secret_access_key: minioadmin
    s3_region: us-east-1
    s3_use_ssl: false
    s3_bucket: data-lake
    s3_prefix: lakehouse
    postgres_host: localhost
    postgres_port: 5432
    postgres_user: postgres
    postgres_password: postgres
    postgres_db: ducklake


layers:
  - name: bronze
    nodes:
      - name: fetch_weather
        inputs:
          - ref: null
            alias: fetch_weather
            methods:
              - method: api
                connection: weather_api
                endpoint: /v1/forecast?latitude=40.71,34.05,41.88,37.77,47.61,25.76,39.74,42.36,29.76,33.45,32.78,38.91,39.95,36.17,35.23,30.27,35.47,33.75&longitude=-74.01,-118.24,-87.63,-122.42,-122.33,-80.19,-104.99,-71.06,-95.37,-112.07,-96.80,-77.04,-75.16,-115.14,-80.84,-97.74,-97.52,-84.39&current=temperature_2m,relative_humidity_2m,wind_speed_10m,pressure_msl,weather_code&timezone=auto
                http_method: GET
        schema:
          - name: city
            type: string
            description: City name derived from coordinates
          - name: latitude
            type: double
            description: Latitude of the observation location
          - name: longitude
            type: double
            description: Longitude of the observation location
          - name: temperature
            type: double
            description: Current temperature in Celsius
          - name: humidity
            type: int
            description: Relative humidity percentage
          - name: wind_speed
            type: double
            description: Wind speed in km/h
          - name: pressure
            type: double
            description: Mean sea level pressure in hPa
          - name: weather_code
            type: int
            description: WMO weather interpretation code
          - name: observation_time
            type: string
            description: ISO 8601 timestamp of the weather observation
        outputs:
          methods:
            - method: sql
              connection: data_lake
              database: oxidizer
              table: weather_bronze
              sql_type: insert

  - name: silver
    nodes:
      - name: weather_scd2
        inputs:
          - ref: bronze.fetch_weather
            alias: fetch_weather
            methods:
              - method: sql
                connection: data_lake
                database: oxidizer
                table: weather_bronze
                sql_type: select
                columns:
                  - name: city
                  - name: latitude
                  - name: longitude
                  - name: temperature
                  - name: humidity
                  - name: wind_speed
                  - name: pressure
                  - name: weather_code
                  - name: observation_time
        schema:
          - name: city
            type: string
            description: City name derived from coordinates
          - name: latitude
            type: double
            description: Latitude of the observation location
          - name: longitude
            type: double
            description: Longitude of the observation location
          - name: temperature
            type: double
            description: Current temperature in Celsius
          - name: humidity
            type: int
            description: Relative humidity percentage
          - name: wind_speed
            type: double
            description: Wind speed in km/h
          - name: pressure
            type: double
            description: Mean sea level pressure in hPa
          - name: weather_code
            type: int
            description: WMO weather interpretation code
          - name: observation_time
            type: string
            description: ISO 8601 timestamp of the weather observation
          - name: valid_from
            type: timestamp
            description: SCD2 record effective start timestamp
          - name: valid_to
            type: timestamp
            description: SCD2 record effective end timestamp (null if current)
          - name: is_current
            type: boolean
            description: Flag indicating if this is the current record version
        outputs:
          methods:
            - method: sql
              connection: data_lake
              database: oxidizer
              table: weather_silver
              sql_type: scd_type_2
              primary_key:
                - city
              begin_date_col: valid_from
              end_date_col: valid_to
              is_current_col: is_current
              tracked_columns:
                - temperature
                - humidity
                - wind_speed
                - pressure
                - weather_code
              timestamp_expr: "staged_changes.observation_time"

  - name: gold
    nodes:
      - name: publish_weather
        inputs:
          - ref: silver.weather_scd2
            alias: weather_scd2
            methods:
              - method: sql
                connection: data_lake
                database: oxidizer
                table: weather_silver
                sql_type: select
                columns:
                  - name: city
                  - name: latitude
                  - name: longitude
                  - name: temperature
                  - name: humidity
                  - name: wind_speed
                  - name: pressure
                  - name: weather_code
                  - name: observation_time
                  - name: valid_from
                  - name: valid_to
                  - name: is_current
                filters:
                  - column: is_current
                    operator: "="
                    value: true
        schema:
          - name: city
            type: string
          - name: latitude
            type: double
          - name: longitude
            type: double
          - name: temperature
            type: double
          - name: humidity
            type: int
          - name: wind_speed
            type: double
          - name: pressure
            type: double
          - name: weather_code
            type: int
          - name: observation_time
            type: string
          - name: valid_from
            type: timestamp
          - name: valid_to
            type: timestamp
          - name: is_current
            type: boolean
        outputs:
          methods:
            - method: stream
