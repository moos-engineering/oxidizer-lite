version: 1
name: scd2

connections:
  - name: weather_api
    type: api
    base_url: https://api.open-meteo.com

  - name: glue_data_lake
    type: glue_catalog
    aws_sso_profile: your-sso-profile
    aws_region: us-west-2
    aws_account_id: 123456789012
    aws_s3_bucket: your-lakehouse-bucket


layers:
  - name: bronze
    nodes:
      - name: fetch_weather
        inputs:
          - ref: null
            alias: fetch_weather
            methods:
              - method: api
                connection: weather_api
                endpoint: /v1/forecast?latitude=40.71,34.05,41.88,37.77,47.61,25.76,39.74,42.36,29.76,33.45,32.78,38.91,39.95,36.17,35.23,30.27,35.47,33.75&longitude=-74.01,-118.24,-87.63,-122.42,-122.33,-80.19,-104.99,-71.06,-95.37,-112.07,-96.80,-77.04,-75.16,-115.14,-80.84,-97.74,-97.52,-84.39&current=temperature_2m,relative_humidity_2m,wind_speed_10m,pressure_msl,weather_code&timezone=auto
                http_method: GET
        schema:
          - name: city
            type: string
            description: City name derived from coordinates
          - name: latitude
            type: double
            description: Latitude of the observation location
          - name: longitude
            type: double
            description: Longitude of the observation location
          - name: temperature
            type: double
            description: Current temperature in Celsius
          - name: humidity
            type: int
            description: Relative humidity percentage
          - name: wind_speed
            type: double
            description: Wind speed in km/h
          - name: pressure
            type: double
            description: Mean sea level pressure in hPa
          - name: weather_code
            type: int
            description: WMO weather interpretation code
          - name: observation_time
            type: string
            description: ISO 8601 timestamp of the weather observation
        outputs:
          methods:
            - method: sql
              connection: glue_data_lake
              database: oxidizer
              table: weather_bronze
              sql_type: insert

  - name: silver
    nodes:
      - name: weather_scd2
        inputs:
          - ref: bronze.fetch_weather
            alias: fetch_weather
            methods:
              - method: sql
                connection: glue_data_lake
                database: oxidizer
                table: weather_bronze
                sql_type: select
                columns:
                  - name: city
                  - name: latitude
                  - name: longitude
                  - name: temperature
                  - name: humidity
                  - name: wind_speed
                  - name: pressure
                  - name: weather_code
                  - name: observation_time
        schema:
          - name: city
            type: string
            description: City name derived from coordinates
          - name: latitude
            type: double
            description: Latitude of the observation location
          - name: longitude
            type: double
            description: Longitude of the observation location
          - name: temperature
            type: double
            description: Current temperature in Celsius
          - name: humidity
            type: int
            description: Relative humidity percentage
          - name: wind_speed
            type: double
            description: Wind speed in km/h
          - name: pressure
            type: double
            description: Mean sea level pressure in hPa
          - name: weather_code
            type: int
            description: WMO weather interpretation code
          - name: observation_time
            type: string
            description: ISO 8601 timestamp of the weather observation
          - name: begin_date
            type: timestamp
            description: SCD Type 2 effective start timestamp
          - name: end_date
            type: timestamp
            description: SCD Type 2 effective end timestamp
          - name: is_current
            type: boolean
            description: Whether this is the current active record
        outputs:
          methods:
            - method: sql
              connection: glue_data_lake
              database: oxidizer
              table: weather_silver
              sql_type: scd_type_2
              primary_key:
                - city
              begin_date_col: begin_date
              end_date_col: end_date
              is_current_col: is_current
              tracked_columns:
                - temperature
                - humidity
                - wind_speed
                - pressure
                - weather_code
              timestamp_expr: "staged_changes.observation_time"

  - name: gold
    nodes:
      - name: publish_weather
        inputs:
          - ref: silver.weather_scd2
            alias: weather_scd2
            methods:
              - method: sql
                connection: glue_data_lake
                database: oxidizer
                table: weather_silver
                sql_type: select
                columns:
                  - name: city
                  - name: latitude
                  - name: longitude
                  - name: temperature
                  - name: humidity
                  - name: wind_speed
                  - name: pressure
                  - name: weather_code
                  - name: observation_time
                  - name: begin_date
                  - name: end_date
                  - name: is_current
                filters:
                  - column: is_current
                    operator: "="
                    value: true
        schema:
          - name: city
            type: string
            description: City name derived from coordinates
          - name: latitude
            type: double
            description: Latitude of the observation location
          - name: longitude
            type: double
            description: Longitude of the observation location
          - name: temperature
            type: double
            description: Current temperature in Celsius
          - name: humidity
            type: int
            description: Relative humidity percentage
          - name: wind_speed
            type: double
            description: Wind speed in km/h
          - name: pressure
            type: double
            description: Mean sea level pressure in hPa
          - name: weather_code
            type: int
            description: WMO weather interpretation code
          - name: observation_time
            type: string
            description: ISO 8601 timestamp of the weather observation
          - name: begin_date
            type: timestamp
            description: SCD Type 2 effective start timestamp
          - name: end_date
            type: timestamp
            description: SCD Type 2 effective end timestamp
          - name: is_current
            type: boolean
            description: Whether this is the current active record
        outputs:
          methods:
            - method: stream
